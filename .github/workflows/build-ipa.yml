name: Build and Release IPA

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Archive
        run: |
          xcodebuild \
            -project FPSValidator/FPSValidator.xcodeproj \
            -scheme FPSValidator \
            -configuration Release \
            -archivePath build/FPSValidator.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -r build/FPSValidator.xcarchive/Products/Applications/FPSValidator.app build/Payload/
          cd build
          zip -r FPSValidator.ipa Payload

      - name: Get Version
        id: version
        run: |
          VERSION=$(xcodebuild -project FPSValidator/FPSValidator.xcodeproj -showBuildSettings | grep MARKETING_VERSION | tr -d " " | cut -d= -f2)
          BUILD=$(xcodebuild -project FPSValidator/FPSValidator.xcodeproj -showBuildSettings | grep CURRENT_PROJECT_VERSION | tr -d " " | cut -d= -f2)
          echo "version=${VERSION}(${BUILD})" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${BUILD}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FPSValidator ${{ steps.version.outputs.version }}
          files: build/FPSValidator.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}